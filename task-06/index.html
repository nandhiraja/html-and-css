<!DOCTYPE html>
<html>

    <head>
        <title>Task-06 Tabbed Content Interface</title>
        <link rel="stylesheet" href="./index.css" />   <!--Link the external css file-->
        <meta name="viewport" content="device-width ,initial-scale=1.0">
    </head>

    <body>
        <header>      <!-- It used for top section content  -->
            
            <nav>      <!-- Navigation button for connecting other pages and sites-->
                <a href="api/v1/about"class="nav-button">About</a>
                <a href="api/v1/home"class="nav-button" >Home</a>
                <a href="api/v1/contact"class="nav-button">contact</a>
                  <div id="head">
                     <h1>Welcome to shopify</h1>
                  </div>
            </nav>            
        </header>

        <main id="tabbed-content">
            <input type="radio" name="option" id="1"/>
            <label for="1">
                <div class ="tab-name">
                    All
                </div>
                <div class="content">
                     All items include Recommended + bestproducts
                     <img style="height: 100px; width: 100px;" src="./image/mobile.png">
                     <img style="height: 100px; width: 100px;" src="./image/desktop.png">



                </div>
            </label>

            <input type="radio" name="option" id="2" />
            <label for="2">
                <div class ="tab-name">
                    Best sales
                </div>
                <div class="content">
                    bestproducts    
                    <img style="height: 100px; width: 100px;" src="./image/desktop.png">

                </div>
            </label>

            <input type="radio" name="option" id="3"/>
            <label for="3">
                <div class ="tab-name">
                    Recommended to you
                </div>
                <div class="content">


                    Recommended product
                                        <img style="height: 100px; width: 100px;" src="./image/mobile.png">


                </div>
            </label>
        </main>
      
        
        <footer>
            <center>
            <h2>@copyrights: shopify.com</h2>
            </center>
        </footer>
    </body>

</html>
