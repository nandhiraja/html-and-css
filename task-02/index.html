<!DOCTYPE html>
<html>

    <head>
        <title>Task-02 Cards</title>
        <link rel="stylesheet" href="./index.css" />   <!--Link the external css file-->
        <meta name="viewport" content="device-width ,initial-scale=1.0">
    </head>

    <body>
      <header>
        <h1>Available items in shopify</h1>

      </header>
      <main>
        <section id="items">
            <div class='card'>
                <img class="card-image" src="./image/desktop.png" alt="card-image">
                <div class="card-title"></div>
                <div class="card-description">Trending: Get today at best price, GEFORCE GPU and 300nits brightness, Intel processor 'h' series</div>
            </div>
            <div class='card'>
                <img class="card-image" src="./image/headphones.png" alt="card-image">
                <div class="card-title">HeadPhone</div>
                <div class="card-description"> vibe with Sound. Latest edition ANC and ENC headphone with 48hr battery support without charging </div>
            </div>
             <div class='card'>
                <img class="card-image" src="./image/mobile.png" alt="card-image">
                <div class="card-title">Smart phone</div>
                <div class="card-description">New Launch: 128GB storage, 5G newtwork, Fast charging</div>
            </div>
        </section>

      </main>
    </body>

</html>
