<!DOCTYPE html>
<html>

    <head>
        <title>Task-08  CSS Accordion Component</title>
        <link rel="stylesheet" href="./index.css" />   <!--Link the external css file-->
        <meta name="viewport" content="device-width ,initial-scale=1.0">
    </head>

    <body>
        <header>      
            
            <nav>     
                <a href="api/v1/about"class="nav-button">About</a>
                <a href="api/v1/home"class="nav-button" >Home</a>
                <a href="api/v1/contact"class="nav-button">contact</a>
                  <div id="head">
                     <h1>Welcome to shopify</h1>
                  </div>
            </nav>            
        </header>


        <main>
            <h1 id="heading-fqa"> FQA </h1>

            <div id="accordion">      <!-- To show the FQA section with open/close dropdown-->
                <card>
                    <input type="checkbox" name="option" id="1" checked/>
                    <label for="1">      <!-- map with input  id-->
                        <div class="question">What if bought product not works</div>
                        <div class="answer">You may contact the support team and get refund/other product</div>
                    </label>
                </card>

                <card>
                    <input type="checkbox" name="option" id="2">
                    <label for="2">
                        <div class="question">How to contact support desk ?</div>
                        <div class="answer">You can connet via email  support@shopify.com</div>
                    </label>
                </card>

                <card>
                     <input type="checkbox" name="option" id="3">
                     <label for="3">
                        <div class="question">what is trail duration for a product ?</div>
                        <div class="answer">It depend on the  vendor they will metion below each of the products</div>
                     </label>    
                </card>

            </div>
        </main>
    
    </body>

</html>
